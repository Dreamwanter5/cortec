services:
  cortec:
    build:
      context: .
      dockerfile: dockerfile
    image: cortec:latest
    container_name: cortec
    ports:
      - "8000:80"
    depends_on:
      - mariadb
    networks:
      - cortec-network
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      APP_URL: http://localhost:8000
      DB_CONNECTION: mysql
      DB_HOST: mariadb
      DB_PORT: 3306
      DB_DATABASE: cortec
      DB_USERNAME: cortec
      DB_PASSWORD: cortec
      CACHE_DRIVER: file
      SESSION_DRIVER: file
      QUEUE_CONNECTION: sync
      HOME: /tmp
    restart: unless-stopped

  mariadb:
    image: mariadb:11
    container_name: cortec_mariadb
    restart: always
    environment:
      MYSQL_DATABASE: cortec
      MYSQL_USER: cortec
      MYSQL_PASSWORD: cortec
      MYSQL_ROOT_PASSWORD: cortec
    volumes:
      - mariadb_data:/var/lib/mysql
    networks:
      - cortec-network

  selenium:
    image: selenium/standalone-chrome
    container_name: cortec_selenium
    ports:
      - "7903:7900" # VNC (pra ver o browser rodando)
    networks:
      - cortec-network
    shm_size: 2gb

networks:
  cortec-network:

volumes:
  mariadb_data:

